version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    
  redis:
    image: redis:7
    ports:
      - "6379:6379"
